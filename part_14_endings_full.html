        const a = s.affection;
        const f = s.flags;
        const t = s.trust;

        // 辅助变量
        const maxAff = Math.max(a.xch, a.xjy, a.gxz, a.hlt, a.xcy);
        const hasAlliance = f.prince_alliance || f.xjy_alliance || f.gxz_alliance;

        // 1. 草原结局 —— 接受和亲命运 + 赫连霆好感足够
        if (a.hlt >= 25 && !f.avoided_heqin) {
            return 'ending_grassland';
        }

        // 2. 新皇结局·瑾王 —— 瑾王发动兵谏（prince_coup）+ 好感高
        if (a.xch >= 45 && f.prince_coup) {
            return 'ending_new_emperor_xch';
        }

        // 3. 远走结局·瑾王 —— 与瑾王结盟但未走兵谏路线（携手远遁）
        if (a.xch >= 45 && f.prince_alliance && !f.prince_coup) {
            return 'ending_prince';
        }

        // 4. 新皇结局·三皇子 —— 三皇子好感高 + 结盟
        if (a.xjy >= 40 && f.xjy_alliance) {
            return 'ending_new_emperor_xjy';
        }

        // 5. 远走结局·状元 —— 顾行之好感最高 + 翻案成功
        if (a.gxz >= 45 && a.gxz > a.xch && a.gxz > a.xjy && s.caseProgress >= 70) {
            return 'ending_scholar';
        }

        // ═══ 第二梯队：权力/独立结局 ═══

        // 6. 女皇结局 —— 位份极高 + 翻案成功 + 独立路线（未深度结盟）
        if (s.rank <= 2 && s.caseProgress >= 85 && !hasAlliance) {
            return 'ending_empress';

        if (t.swn >= 85 && !hasAlliance) {
            return 'ending_sisters';
        }

        // 8. 帝后结局 —— 皇帝好感最高且够高
        if (a.xcy >= 50 && a.xcy >= maxAff) {
            return 'ending_emperor_queen';
        }

        // 9. 垂帘结局 —— 位份尚可 + 翻案有进展 + 三皇子有好感但未显式结盟
        if (s.rank <= 5 && s.caseProgress >= 50 && a.xjy >= 25 && !f.xjy_alliance) {
            return 'ending_regent';
        }

        // 10. 姐妹结局（宽松版）—— 信任极高即便有结盟
        if (t.swn >= 90) {
            return 'ending_sisters';
        }

        // ═══ 兜底 ═══
        // 11. 孤寂结局 —— 无深度羁绊、翻案未竟
        return 'ending_lonely';
    }

            <p class="dialogue" data-speaker="赫连霆">"欢迎回家。我的可敦。"</p>

            <p style="text-align:center;color:#8B7355;font-size:0.85rem;">离开中原，拥抱自由。有些爱情，需要你放弃整个旧世界。</p>
        `,
        choices: [{ text: '🔄 重新开始游戏', next: 'restart', effects: {} }]

    // ===== 姐妹结局 =====
    storyNodes['ending_sisters'] = {
        location: '江南 · 某处小城',
        time: '翌年春',
        text: `

            <p class="dialogue" data-speaker="苏婉宁">"自由了！！！姐姐我们自由了！！！"</p>

            <p>你们在江南的一座小城定居。用翻案后朝廷发还的沈家旧产置办了一间小院。苏婉宁的弟弟病愈后也来了，还有那个憨厚的前侍卫林崇——两人终成眷属。</p>

            <p>某天傍晚，你们坐在院中桂树下（特意种的，和永安殿那棵一样），分饮一壶茶。</p>
            <p class="dialogue" data-speaker="苏婉宁">"姐姐——"苏婉宁靠在你肩上，笑眯眯的，"当初在掖庭我说「谁也不丢下谁」——我做到了吧？"</p>
            <p class="dialogue" data-speaker="玩家">"做到了。"你轻轻拍了拍她的手，"我们都做到了。"</p>
            <p style="text-align:center;margin-top:2rem;color:var(--gold);font-size:1rem;">—— 终 ——</p>
            <p style="text-align:center;color:#8B7355;font-size:0.85rem;">最温暖的结局。在这冰冷的世间，你们是彼此最坚定的依靠。</p>
        `,
        choices: [{ text: '🔄 重新开始游戏', next: 'restart', effects: {} }]
    };

    // ===== 孤寂结局 =====
    storyNodes['ending_lonely'] = {
        location: '大晟皇宫 · 永安殿',
        time: '数年后',
        text: `
            <p style="text-align:center;color:var(--gold);font-family:'Ma Shan Zheng',cursive;font-size:1.5rem;margin-bottom:2rem;">—— 孤寂结局 ——</p>
            <p>翻案成功了。父亲沈彦清被追封太子太傅，沈家冤案载入史册。</p>
            <p>你达成了入宫以来唯一的目标。</p>
            <p>但当尘埃落定后你环顾四周——身边空无一人。</p>
