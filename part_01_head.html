<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>凤鸣宫阙 - 古风宫斗互动叙事</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A96E;
            --gold-light: #E8D5A3;
            --crimson: #8B2252;
            --crimson-dark: #5C1638;
            --jade: #5B8C6F;
            --ink: #2C2C2C;
            --parchment: #F5F0E8;
            --parchment-dark: #E8E0D0;
            --rouge: #C75C5C;
            --plum: #6B3A6B;
            /* 响应式尺寸变量 */
            --game-width: 100vw;
            --game-height: 100vh;
            --game-height: 100dvh;
            --base-font: clamp(14px, 3.8vw, 18px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'Noto Serif SC', serif;
            background: #1a0a0a;
            color: var(--ink);
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .font-brush { font-family: 'Ma Shan Zheng', cursive; }

        /* ========== 9:16 游戏容器 ========== */
        #game-wrapper {
            position: relative;
            width: var(--game-width);
            height: var(--game-height);
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100dvh;
            margin: 0 auto;
            overflow: hidden;
            background: var(--parchment);
        }
        /* 桌面端：限制为9:16比例居中显示 */
        @media (min-width: 768px) and (min-aspect-ratio: 3/4) {
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #0d0506 0%, #1a0a0a 50%, #0d0506 100%);
            }
            #game-wrapper {
                --game-width: min(56.25vh, 480px);
                --game-height: min(100vh, 853px);
                width: var(--game-width);
                height: var(--game-height);
                border-radius: 1.5rem;
                box-shadow: 0 0 80px rgba(201,169,110,0.15), 0 0 0 1px rgba(201,169,110,0.1);
                max-width: 480px;
                max-height: 853px;
            }
            :root {
                --base-font: clamp(14px, 2.2vh, 17px);
            }
        }
        /* 超宽桌面 */
        @media (min-width: 1200px) {
            #game-wrapper {
                --game-width: min(56.25vh, 430px);
                --game-height: min(100vh, 760px);
                max-width: 430px;
                max-height: 760px;
            }
        }

        /* ========== 启动画面 ========== */
        #splash-screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url('img/封面.png') center center / cover no-repeat;
            transition: opacity 1s ease;
        }
        #splash-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(26,10,10,0.4) 0%, rgba(45,21,32,0.5) 40%, rgba(26,10,10,0.7) 100%);
            pointer-events: none;
        }
        #splash-screen > * { position: relative; z-index: 1; }
        #splash-screen > .music-toggle-fixed { position: absolute; z-index: 101; }
        #splash-screen.hidden { opacity: 0; pointer-events: none; }
        .splash-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(2.8rem, 12vw, 4.5rem);
            color: var(--gold);
            text-shadow: 0 0 30px rgba(201,169,110,0.5), 0 4px 8px rgba(0,0,0,0.8);
            letter-spacing: 0.5rem;
            animation: titleGlow 3s ease-in-out infinite;
        }
        .splash-subtitle {
            font-size: clamp(0.85rem, 3.2vw, 1.1rem);
            color: var(--gold-light);
            opacity: 0.7;
            margin-top: 1rem;
            letter-spacing: 0.2rem;
            padding: 0 1.5rem;
            text-align: center;
        }
        .splash-btn {
            margin-top: clamp(1.5rem, 6vw, 3rem);
            padding: 0.8rem 2.5rem;
            border: 1px solid var(--gold);
            color: var(--gold);
            background: transparent;
            font-family: 'Noto Serif SC', serif;
            font-size: var(--base-font);
            cursor: pointer;
            letter-spacing: 0.2rem;
            transition: all 0.3s ease;
            animation: fadeInUp 2s ease 1s both;
            min-height: 44px;
            border-radius: 4px;
        }
        .splash-btn:hover, .splash-btn:active {
            background: var(--gold);
            color: #1a0a0a;
            box-shadow: 0 0 20px rgba(201,169,110,0.4);
        }
        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 30px rgba(201,169,110,0.5), 0 4px 8px rgba(0,0,0,0.8); }
            50% { text-shadow: 0 0 50px rgba(201,169,110,0.8), 0 4px 8px rgba(0,0,0,0.8); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 命名界面 ========== */
        #naming-screen {
            position: absolute;
            inset: 0;
            z-index: 90;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url('img/玩家.png') center top / cover no-repeat;
            padding: 1.5rem;
        }
        #naming-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(26,10,10,0.6) 0%, rgba(45,21,32,0.65) 40%, rgba(26,10,10,0.8) 100%);
            pointer-events: none;
        }
        #naming-screen > * { position: relative; z-index: 1; }
        #naming-screen > .music-toggle-fixed { position: absolute; z-index: 101; }
        #naming-screen.active { display: flex; }
        .naming-box {
            text-align: center;
            animation: fadeInUp 0.8s ease both;
            width: 100%;
            max-width: 320px;
        }
        .naming-box h2 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(1.5rem, 5.5vw, 2rem);
            color: var(--gold);
            margin-bottom: 1.2rem;
        }
        .naming-box p {
            color: var(--gold-light);
            opacity: 0.7;
            margin-bottom: 1.5rem;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
        }
        .naming-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            text-align: center;
            padding: 0.5rem 1.5rem;
            outline: none;
            width: min(200px, 60%);
            min-height: 44px;
        }
        .naming-input::placeholder { color: rgba(201,169,110,0.3); }

        /* ========== 主游戏界面 ========== */
        #game-screen {
            display: none;
            height: 100%;
            width: 100%;
            position: relative;
        }
        #game-screen.active { display: flex; }

        /* ========== 顶部状态栏 ========== */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: linear-gradient(180deg, rgba(44,28,28,0.95) 0%, rgba(44,28,28,0) 100%);
            padding: clamp(0.5rem, 2vw, 0.8rem) clamp(0.6rem, 3vw, 1.5rem);
            padding-top: max(env(safe-area-inset-top), clamp(0.5rem, 2vw, 0.8rem));
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            font-size: clamp(0.6rem, 2.5vw, 0.75rem);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: var(--gold-light);
            border: 1px solid rgba(201,169,110,0.2);
            white-space: nowrap;
        }
        .status-pill .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ========== 剧情显示区 ========== */
        .story-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: linear-gradient(135deg, #F5F0E8 0%, #EDE5D8 50%, #F0E8DB 100%);
            position: relative;
            overflow: hidden;
        }
        .story-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 Q35 15 30 25 Q25 15 30 5' fill='none' stroke='%23C9A96E' stroke-width='0.3' opacity='0.1'/%3E%3C/svg%3E") repeat;
            pointer-events: none;
        }

        .story-scroll {
            flex: 1;
            overflow-y: auto;
            padding: clamp(3.5rem, 12vw, 5rem) clamp(1rem, 4vw, 2rem) clamp(1rem, 3vw, 2rem);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .story-scroll::-webkit-scrollbar { width: 3px; }
        .story-scroll::-webkit-scrollbar-track { background: transparent; }
        .story-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        /* ========== 场景标题 ========== */
        .scene-header {
            text-align: center;
            margin-bottom: clamp(1rem, 4vw, 2rem);
            padding: 1rem;
            position: relative;
        }
        .scene-header::before, .scene-header::after {
            content: '◆';
            color: var(--gold);
            opacity: 0.5;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.5rem;
        }
        .scene-header::before { left: 10%; }
        .scene-header::after { right: 10%; }
        .scene-location {
            font-size: clamp(0.7rem, 2.8vw, 0.85rem);
            color: var(--gold);
            letter-spacing: 0.2rem;
            margin-bottom: 0.3rem;
        }
        .scene-time {
            font-size: clamp(0.65rem, 2.4vw, 0.75rem);
            color: #8B7355;
            letter-spacing: 0.15rem;
        }

        /* ========== 剧情文本 ========== */
        .story-text {
            max-width: 100%;
            margin: 0 auto;
            line-height: 2;
            font-size: var(--base-font);
            color: #3D3028;
            text-align: justify;
            animation: fadeIn 0.8s ease;
        }
        .story-text p {
            margin-bottom: 1rem;
            text-indent: 2em;
        }
        .story-text .dialogue {
            text-indent: 0;
            padding-left: 0.8rem;
            border-left: 2px solid var(--gold);
            margin: 0.8rem 0;
            color: var(--crimson);
        }
        .story-text .narration {
            color: #6B5B4F;
            font-style: italic;
        }
        .story-text .thought {
            color: var(--plum);
            text-indent: 0;
            padding: 0.5rem 0.8rem;
            background: rgba(107,58,107,0.05);
            border-radius: 4px;
        }
        /* 对话头像与布局 */
        .dialogue-avatar {
            width: clamp(32px, 9vw, 40px);
            height: clamp(32px, 9vw, 40px);
            border-radius: 999px;
            object-fit: cover;
            object-position: top center;
            flex-shrink: 0;
            border: 1px solid rgba(201,169,110,0.7);
            box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
            background: #111;
            overflow: hidden;
        }
        .text-avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.6rem, 2.2vw, 0.72rem);
            color: #FFFFFF;
            background: #2C2C2C;
            border: 1px solid rgba(201,169,110,0.4);
            letter-spacing: 0.02rem;
        }
        .dialogue-with-avatar {
            display: flex;
            align-items: flex-start;
            gap: clamp(0.4rem, 1.6vw, 0.6rem);
            margin: 0.8rem 0;
        }
        .dialogue-with-avatar .dialogue {
            margin: 0;
            padding-left: 0.6rem;
            border-left: 2px solid var(--gold);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 选项区域 ========== */
        .choices-container {
            padding: clamp(0.8rem, 3vw, 1.5rem) clamp(0.8rem, 3vw, 1.5rem) clamp(1rem, 3vw, 2rem);
            padding-bottom: max(env(safe-area-inset-bottom), clamp(1rem, 3vw, 2rem));
            background: linear-gradient(0deg, rgba(237,229,216,1) 0%, rgba(237,229,216,0.95) 80%, rgba(237,229,216,0) 100%);
            position: relative;
        }
        .choice-btn {
            display: block;
            width: 100%;
            margin: 0.5rem auto;
            padding: clamp(0.7rem, 2.5vw, 1rem) clamp(0.8rem, 3vw, 1.2rem);
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(201,169,110,0.3);
            border-radius: 8px;
            text-align: left;
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(0.8rem, 3.2vw, 0.95rem);
            color: var(--ink);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-height: 44px;
            -webkit-tap-highlight-color: transparent;
        }
        .choice-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--gold);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }
        .choice-btn:hover, .choice-btn:active {
            background: rgba(255,255,255,0.95);
            border-color: var(--gold);
            box-shadow: 0 2px 10px rgba(201,169,110,0.15);
        }
        .choice-btn:hover::before, .choice-btn:active::before { transform: scaleY(1); }
        .choice-btn .choice-label {
            font-weight: 600;
            color: var(--gold);
            margin-right: 0.4rem;
        }
        .choice-btn .choice-warning {
            display: inline-block;
            font-size: clamp(0.65rem, 2.4vw, 0.75rem);
            color: var(--rouge);
            margin-left: 0.3rem;
        }
        .choice-btn:active {
            transform: scale(0.98);
        }

        /* ========== 侧边栏 - 状态面板 ========== */
        .side-panel {
            position: absolute;
            right: -100%;
            top: 0;
            bottom: 0;
            width: 85%;
            max-width: 360px;
            background: rgba(44,28,28,0.97);
            backdrop-filter: blur(20px);
            z-index: 60;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: clamp(1.2rem, 4vw, 2rem) clamp(1rem, 3vw, 1.5rem);
            padding-top: max(env(safe-area-inset-top), clamp(1.2rem, 4vw, 2rem));
            border-left: 1px solid rgba(201,169,110,0.2);
            -webkit-overflow-scrolling: touch;
        }
        .side-panel.open { right: 0; }
        .side-panel::-webkit-scrollbar { width: 3px; }
        .side-panel::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        .panel-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(1.2rem, 4.5vw, 1.5rem);
            color: var(--gold);
            text-align: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(201,169,110,0.3);
        }
        .char-gallery {
            margin-bottom: clamp(1rem, 3vw, 1.4rem);
        }
        .char-gallery-header {
            font-size: clamp(0.65rem, 2.4vw, 0.75rem);
            color: var(--gold-light);
            opacity: 0.6;
            letter-spacing: 0.15rem;
            margin: 0.6rem 0 0.3rem;
            padding-left: 0.1rem;
        }
        .char-gallery-header:first-child { margin-top: 0; }
        .char-gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(0.5rem, 1.8vw, 0.7rem);
        }
        .char-card {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.45rem;
            border-radius: 0.5rem;
            background: radial-gradient(circle at 0 0, rgba(249,250,251,0.06), rgba(17,24,39,0.9));
            border: 1px solid rgba(201,169,110,0.35);
            box-shadow: 0 0 0 1px rgba(0,0,0,0.6);
        }
        .char-card-avatar {
            width: clamp(32px, 10vw, 44px);
            height: clamp(44px, 14vw, 60px);
            border-radius: 0.5rem;
            object-fit: cover;
            object-position: top center;
            flex-shrink: 0;
        }
        .char-card-name {
            color: var(--gold-light);
            font-size: clamp(0.72rem, 2.6vw, 0.9rem);
            letter-spacing: 0.08rem;
            white-space: nowrap;
        }
        .char-card-info {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            overflow: hidden;
        }
        .char-card-title {
            color: #999;
            font-size: clamp(0.55rem, 2vw, 0.65rem);
            letter-spacing: 0.04rem;
            white-space: nowrap;
        }
        .char-card { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .char-card:active { transform: scale(0.95); box-shadow: 0 0 8px rgba(201,169,110,0.5); }

        /* 角色全屏查看 */
        .char-fullscreen {
            position: absolute;
            inset: 0;
            z-index: 200;
            background: rgba(10,5,5,0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            animation: fadeIn 0.3s ease;
        }
        .char-fullscreen.active { display: flex; }
        .char-fullscreen-close {
            position: absolute;
            top: clamp(0.8rem, 3vw, 1.2rem);
            right: clamp(0.8rem, 3vw, 1.2rem);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(201,169,110,0.15);
            border: 1px solid rgba(201,169,110,0.5);
            color: var(--gold-light);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 201;
        }
        .char-fullscreen-close:active { background: rgba(201,169,110,0.3); }
        .char-fullscreen img {
            max-width: 80%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 0.8rem;
            box-shadow: 0 0 40px rgba(201,169,110,0.2);
        }
        .char-fullscreen-name {
            margin-top: 1rem;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            color: var(--gold);
            letter-spacing: 0.2rem;
        }
        .char-fullscreen-title {
            margin-top: 0.3rem;
            font-size: clamp(0.8rem, 3vw, 1rem);
            color: #BBB;
            letter-spacing: 0.1rem;
        }
        .stat-group {
            margin-bottom: 1.2rem;
        }
        .stat-group-title {
            font-size: clamp(0.7rem, 2.6vw, 0.8rem);
            color: var(--gold-light);
            letter-spacing: 0.1rem;
            margin-bottom: 0.6rem;
            opacity: 0.7;
        }
        .stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 0.4rem;
        }
        .stat-name {
            color: #DDD;
            font-size: clamp(0.72rem, 2.8vw, 0.85rem);
            white-space: nowrap;
            flex-shrink: 0;
            width: 6.5em;
        }
        .stat-bar {
            flex: 1;
            max-width: 80px;
            min-width: 50px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .stat-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        .stat-value {
            font-size: clamp(0.65rem, 2.4vw, 0.75rem);
            color: var(--gold);
            min-width: 26px;
            text-align: right;
            flex-shrink: 0;
        }
        .stat-flash {
            animation: statFlash 0.45s ease-out;
        }
        @keyframes statFlash {
            0% { transform: scale(1); filter: brightness(1); }
            40% { transform: scale(1.05); filter: brightness(1.4); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        /* ========== 状态变化通知 ========== */
        .notification {
            position: absolute;
            top: clamp(50px, 12vw, 80px);
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(44,28,28,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201,169,110,0.3);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            color: var(--gold-light);
            font-size: clamp(0.72rem, 2.8vw, 0.85rem);
            z-index: 70;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            white-space: normal;
            max-width: 90%;
            word-break: break-all;
            text-align: center;
        }
        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .notification.positive { border-color: var(--jade); }
        .notification.negative { border-color: var(--rouge); }

        /* ========== 菜单按钮 ========== */
        .menu-btn {
            width: clamp(32px, 9vw, 40px);
            height: clamp(32px, 9vw, 40px);
            min-width: 32px;
            min-height: 32px;
            border-radius: 50%;

        /* ========== 遮罩 ========== */
        .overlay {

            font-size: clamp(0.8rem, 3vw, 0.9rem);

            text-align: center;

            margin-bottom: 2rem;

        /* ========== 音乐控制按钮（封面/命名） ========== */
        .music-toggle-fixed {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(201,169,110,0.1);
            border: 1px solid rgba(201,169,110,0.3);

            opacity: 0.8;

            width: clamp(40px, 12vw, 60px);

            accent-color: var(--gold-light);
            cursor: pointer;

        /* ========== iPhone X+ safe area ========== */
        @supports (padding-top: env(safe-area-inset-top)) {
            .top-bar {
                padding-top: max(env(safe-area-inset-top), 0.5rem);
            }
            .choices-container {
                padding-bottom: max(env(safe-area-inset-bottom), 1rem);
            }
        }

        /* ========== 横屏提示 ========== */
        @media (orientation: landscape) and (max-height: 500px) {
            #landscape-warning {
                display: flex !important;

        }
        #landscape-warning {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(10,0,0,0.97);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--gold-light);
            font-size: 1rem;
            letter-spacing: 0.1rem;
            text-align: center;
            padding: 2rem;

        #landscape-warning::before {
            content: '📱';
            font-size: 2.5rem;
            margin-bottom: 1rem;
            animation: rotateHint 2s ease-in-out infinite;
        }
        @keyframes rotateHint {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-90deg); }
            75% { transform: rotate(-90deg); }
        }
