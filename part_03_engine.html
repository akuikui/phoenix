    <script>
    // ============ 全局剧情数据 ============
    const storyNodes = window.storyNodes || {};
    window.storyNodes = storyNodes;

    // ============ 存档 & 状态配置 ============
    const SAVE_KEY = `FMGQ_SAVE_${document.title || '凤鸣宫阙'}`;
    const SAVE_KEY_MANUAL = `FMGQ_SAVE_MANUAL_${document.title || '凤鸣宫阙'}`;

    const DEFAULT_GAME_STATE = {
        playerName: '蕴华',
        safety: 50,
        mainProgress: 5,
        caseProgress: 5,
        rank: 9, // 9=采女
        affection: { xch: 25, xjy: 20, gxz: 30, hlt: 0, xcy: 15 },
        trust: { swn: 60 },
        faction: { queen: 0, consort: 0, fallen: 1, neutral: 0 },
        clues: [],
        flags: {},
        currentNode: 'start',
        chapter: 1
    };

    function createInitialGameState() {
        return JSON.parse(JSON.stringify(DEFAULT_GAME_STATE));
    }

    // ============ 游戏状态 ============
    let gameState = createInitialGameState();

    const rankNames = ['', '皇后', '皇贵妃', '贵妃', '妃', '嫔', '婕妤', '美人', '才人', '采女'];

    const STAT_META = {
        safety: { label: '安全值', icon: '🛡️', type: 'survival', max: 100 },
        mainProgress: { label: '翻案进度', icon: '📜', type: 'progress', max: 100 },
        rank: { label: '位份', icon: '👑', type: 'class' }
    };

    const CHARACTER_IMAGES = {
        '萧承珩': 'img/萧承珩.png',
        '瑾王': 'img/萧承珩.png',
        '萧璟言': 'img/萧璟言.png',
        '三皇子': 'img/萧璟言.png',
        '萧承煜': 'img/萧承煜.png',
        '皇帝': 'img/萧承煜.png',
        '陛下': 'img/萧承煜.png',
        '萧璟恒': 'img/萧璟恒.png',
        '大皇子': 'img/萧璟恒.png',
        '萧璟宁': 'img/萧璟宁.png',
        '四皇子': 'img/萧璟宁.png',
        '顾行之': 'img/顾行之.png',
        '赫连霆': 'img/赫连霆.png',
        '苏婉宁': 'img/苏婉宁.png',
        '淑妃': 'img/淑妃.png',
        '柳氏': 'img/淑妃.png',
        '德妃': 'img/德妃.png',
        '王氏': 'img/德妃.png',
        '贤妃': 'img/贤妃.png',
        '赵氏': 'img/贤妃.png',
        '皇后': 'img/皇后.png',
        '郑氏': 'img/皇后.png',
        '玩家': 'img/玩家.png',
        '阿蛮': 'img/阿蛮.png',
        '林崇': 'img/林崇.png'
    };

    // ============ 工具函数 ============
    function clamp(value, min, max) {
        const n = typeof value === 'number' ? value : Number(value) || 0;
        if (typeof max === 'number') {
            return Math.max(min, Math.min(max, n));
        }
        return Math.max(min, n);
    }

    function clampPercent(value) {
        return clamp(value, 0, 100);
    }

    function flashStatElement(el) {
        if (!el) return;
        el.classList.remove('stat-flash');
        // 触发重绘以重启动画
        void el.offsetWidth;
        el.classList.add('stat-flash');
    }

    const DEFAULT_DEATH_TEXT = '你在后宫的暗涌中失去了最后的庇护，再也无法看到翻案的那一天……';

    // ============ 通知队列系统 ============
    let notificationQueue = [];
    let notificationActive = false;

    function enqueueNotification(message, type) {
        if (!message) return;
        notificationQueue.push({ message, type });
        if (!notificationActive) {
            showNextNotification();
        }
    }

    function showNextNotification() {
        if (!notificationQueue.length) {
            notificationActive = false;
            return;
        }
        notificationActive = true;
        const item = notificationQueue.shift();
        const notif = document.getElementById('notification');
        if (!notif) {
            notificationActive = false;
            return;
        }
        notif.textContent = item.message;
        notif.className = 'notification' + (item.type ? ' ' + item.type : '');
        // 触发一次重绘再显示
        void notif.offsetWidth;
        notif.classList.add('show');
        const DURATION = 2500;
        setTimeout(() => {
            notif.classList.remove('show');
            setTimeout(showNextNotification, 400);
        }, DURATION);
    }

    function showNotification(text, type) {
        enqueueNotification(text, type);
    }

    // ============ UI 控制 ============
    let bgmStarted = false;

    function tryStartBGM() {
        if (typeof BGM === 'undefined' || !BGM || typeof BGM.start !== 'function') return;

        // 如果 AudioContext 已存在但处于挂起状态，尝试恢复
        if (BGM.ctx && BGM.ctx.state === 'suspended') {
            try { BGM.ctx.resume(); } catch (e) {}
        }

        // 已成功启动过则不再重复
        if (bgmStarted) return;

        // 尝试启动
        try {
            BGM.start('title');
        } catch (e) {
            return;
        }

        if (!BGM.ctx) return;

        // 启动成功与否必须等待异步 resume 完成后再判定：
        // 移动端新建的 AudioContext 初始状态为 suspended，resume() 是【异步】的，
        // 之前的代码在调用 resume()/start() 后立刻同步判断 state，会在移动端永远
        // 得到 suspended，从而误判为"被拦截"并把音频整个销毁——导致手机点开关无效。
        const finalize = () => {
            if (!BGM.ctx) return;
            if (BGM.ctx.state === 'running') {
                // 真正开始播放
                bgmStarted = true;
            } else if (BGM.ctx.state === 'suspended') {
                // 确实被浏览器拦截（无用户手势）——清理并等待下次用户手势重试
                BGM.stop();
                try { BGM.ctx.close(); } catch (e) {}
                BGM.ctx = null;
                BGM.masterGain = null;
                BGM.filter = null;
                BGM.reverb = null;
                BGM.reverbGain = null;
                BGM.isPlaying = false;
            }
            if (typeof BGM.updateMusicIcon === 'function') {
                BGM.updateMusicIcon();
            }
        };

        if (BGM.ctx.state === 'running') {
            // 桌面端：用户手势内新建的 AudioContext 通常立即为 running，直接判定
            finalize();
        } else {
            // 移动端：先尝试 resume，等其异步完成后再判定，避免提前销毁
            let settled = false;
            const once = () => { if (settled) return; settled = true; finalize(); };
            try {
                const p = BGM.ctx.resume();
                if (p && typeof p.then === 'function') {
                    p.then(once).catch(once);
                }
            } catch (e) {}
            // 兜底：部分浏览器 resume() 不返回 Promise，用短延时再复查一次
            setTimeout(once, 250);
            if (typeof BGM.updateMusicIcon === 'function') {
                BGM.updateMusicIcon();
            }
        }
    }

    // 封面音乐开关：处理 BGM 未初始化的情况
    function toggleSplashMusic() {
        if (typeof BGM === 'undefined' || !BGM) return;

        // 如果 BGM 尚未启动，点击开关视为"启动音乐"
        if (!bgmStarted) {
            BGM.isMuted = false;
            tryStartBGM();
            return;
        }

        // BGM 已启动 - 正常切换静音
        BGM.toggleMute();
    }

    function initAudioAndShowSplash() {
        tryStartBGM();
    }

    function handleOrientationChange() {
        const warning = document.getElementById('landscape-warning');
        if (!warning) return;
        if (window.innerWidth > window.innerHeight && window.innerHeight < 500) {
            // 具体展示逻辑交给 CSS 媒体查询，这里只在竖屏时强制隐藏
        } else {
            warning.style.display = 'none';
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        // 横屏检测
        try {
            handleOrientationChange();
            window.addEventListener('resize', handleOrientationChange);
            window.addEventListener('orientationchange', handleOrientationChange);
        } catch (e) {}

        // 初始化角色画廊（在任何加载/读档前）
        initCharacterGallery();

        // 尝试自动播放标题音乐
        // 如果浏览器允许（用户曾交互或策略宽松），音乐会立即开始
        // 如果被阻止，tryStartBGM 会自动清理状态，等待用户首次点击时重试
        tryStartBGM();

        // 绑定开始/继续按钮
        const newBtn = document.getElementById('btn-new-game');
        const contBtn = document.getElementById('btn-continue-game');

        if (newBtn) {
            newBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                if (hasSave()) {
                    confirmNewGame();
                } else {
                    gameState = createInitialGameState();
                    updateUI();
                    showNaming();
                }
            });
        }

        if (contBtn) {
            if (hasSave()) {
                contBtn.style.display = 'inline-block';
            } else {
                contBtn.style.display = 'none';
            }
            contBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                if (loadGame()) {
                    const splash = document.getElementById('splash-screen');
                    if (splash) splash.classList.add('hidden');
                    const naming = document.getElementById('naming-screen');
                    if (naming) naming.classList.remove('active');
                    const game = document.getElementById('game-screen');
                    if (game) game.classList.add('active');

                    tryStartBGM();
                    try {
                        if (typeof BGM !== 'undefined' && BGM) {
                            if (BGM.isPlaying && BGM.currentMood !== 'calm') {
                                BGM.changeMood('calm');
                            } else if (!BGM.isPlaying) {
                                BGM.start('calm');
                            }
                        }
                    } catch (err) {}

                    const nodeId = gameState.currentNode || 'start';
                    renderNode(nodeId, { skipEffects: true, fromLoad: true });
                } else {
                    showNotification('没有可继续的进度，请先开始新的命运。', 'negative');
                }
            });
        }
    });

    function showNaming() {
        // 首次交互时启动音频
        tryStartBGM();
        const splash = document.getElementById('splash-screen');
        if (splash) splash.classList.add('hidden');
        // 隐藏封面上的音乐按钮（游戏界面有自己的）
        const splashBtn = document.getElementById('splash-music-btn');
        if (splashBtn) splashBtn.style.display = 'none';
        setTimeout(() => {
            const naming = document.getElementById('naming-screen');
            if (naming) naming.classList.add('active');
            const input = document.getElementById('player-name-input');
            if (input) input.focus();
        }, 800);
        // 标题音乐继续播放，无需切换
    }

    function startGame() {
        const input = document.getElementById('player-name-input');
        const nameInput = input ? input.value.trim() : '';
        // 全量重置状态
        gameState = createInitialGameState();
        gameState.playerName = nameInput || DEFAULT_GAME_STATE.playerName;

        const naming = document.getElementById('naming-screen');
        const game = document.getElementById('game-screen');
        if (naming) naming.classList.remove('active');
        if (game) game.classList.add('active');

        // 从标题音乐平滑过渡到游戏内 calm 氛围
        try {
            if (typeof BGM !== 'undefined' && BGM) {
                if (BGM.isPlaying) {
                    BGM.changeMood('calm');
                } else {
                    BGM.start('calm');
                    bgmStarted = true;
                }
            }
        } catch (e) {}

        updateUI();
        initCharacterGallery();
        renderNode('start');
    }

    function togglePanel() {
        const panel = document.getElementById('side-panel');
        const overlay = document.getElementById('overlay');
        if (panel) panel.classList.toggle('open');
        if (overlay) overlay.classList.toggle('active');
    }

    // ============ UI 刷新 ============
    function updateUI(changedKeys) {
        const changed = changedKeys instanceof Set ? changedKeys : null;

        // 同步与校正核心数值
        const maxSafety = STAT_META.safety.max || 100;
        const maxProgress = STAT_META.mainProgress.max || 100;

        gameState.safety = clamp(gameState.safety, 0, maxSafety);
        const progress = (typeof gameState.mainProgress === 'number')
            ? gameState.mainProgress
            : (typeof gameState.caseProgress === 'number' ? gameState.caseProgress : 0);
        gameState.mainProgress = clamp(progress, 0, maxProgress);
        gameState.caseProgress = gameState.mainProgress;

        const safety = gameState.safety;
        const mainProgress = gameState.mainProgress;
        const rankLabel = rankNames[gameState.rank] || rankNames[DEFAULT_GAME_STATE.rank];

        // 顶栏
        const elSafetyTop = document.getElementById('safety-display');
        if (elSafetyTop) elSafetyTop.textContent = safety;
        const elRankTop = document.getElementById('rank-display');
        if (elRankTop) elRankTop.textContent = rankLabel;
        const elCaseTop = document.getElementById('case-display');
        if (elCaseTop) elCaseTop.textContent = mainProgress + '%';

        // 侧边栏 - 核心状态
        const elValSafety = document.getElementById('val-safety');
        const elBarSafety = document.getElementById('bar-safety');
        const elValCase = document.getElementById('val-case');
        const elBarCase = document.getElementById('bar-case');
        const elValRank = document.getElementById('val-rank');

        if (elValSafety) elValSafety.textContent = safety;
        if (elBarSafety) {
            elBarSafety.style.width = clampPercent(safety) + '%';
            if (safety <= 30) elBarSafety.style.background = 'var(--rouge)';
            else if (safety <= 50) elBarSafety.style.background = '#F59E0B';
            else elBarSafety.style.background = 'var(--jade)';
        }

        if (elValCase) elValCase.textContent = mainProgress + '%';
        if (elBarCase) {
            elBarCase.style.width = clampPercent(mainProgress) + '%';
        }

        if (elValRank) elValRank.textContent = rankLabel;

        // 好感度
        const a = gameState.affection || {};
        const t = gameState.trust || {};

        const valXch = document.getElementById('val-xch');
        const barXch = document.getElementById('bar-xch');
        if (valXch) valXch.textContent = a.xch;
        if (barXch) barXch.style.width = clampPercent(a.xch) + '%';

        const valXjy = document.getElementById('val-xjy');
        const barXjy = document.getElementById('bar-xjy');
        if (valXjy) valXjy.textContent = a.xjy;
        if (barXjy) barXjy.style.width = clampPercent(a.xjy) + '%';

        const valGxz = document.getElementById('val-gxz');
        const barGxz = document.getElementById('bar-gxz');
        if (valGxz) valGxz.textContent = a.gxz;
        if (barGxz) barGxz.style.width = clampPercent(a.gxz) + '%';

        const valHlt = document.getElementById('val-hlt');
        const barHlt = document.getElementById('bar-hlt');
        if (valHlt) valHlt.textContent = a.hlt;
        if (barHlt) barHlt.style.width = clampPercent(a.hlt) + '%';

        const valXcy = document.getElementById('val-xcy');
        const barXcy = document.getElementById('bar-xcy');
        if (valXcy) valXcy.textContent = a.xcy;
        if (barXcy) barXcy.style.width = clampPercent(a.xcy) + '%';

        const valSwn = document.getElementById('val-swn');
        const barSwn = document.getElementById('bar-swn');
        if (valSwn) valSwn.textContent = t.swn;
        if (barSwn) barSwn.style.width = clampPercent(t.swn) + '%';

        // 线索
        const cluesList = document.getElementById('clues-list');
        if (cluesList) {
            if (Array.isArray(gameState.clues) && gameState.clues.length > 0) {
                cluesList.innerHTML = gameState.clues.map(c => `<div>📋 ${c}</div>`).join('');
            } else {
                cluesList.innerHTML = '<div style="opacity:0.5;">尚未获取任何线索……</div>';
            }
        }

        // 数值变动闪烁
        if (changed) {
            if (changed.has('safety')) {
                flashStatElement(elSafetyTop);
                flashStatElement(elValSafety);
                flashStatElement(elBarSafety);
            }
            if (changed.has('mainProgress')) {
                flashStatElement(elCaseTop);
                flashStatElement(elValCase);
                flashStatElement(elBarCase);
            }
            if (changed.has('rank')) {
                flashStatElement(elRankTop);
                flashStatElement(elValRank);
            }
            ['xch','xjy','gxz','hlt','xcy'].forEach(key => {
                if (changed.has('affection.' + key)) {
                    flashStatElement(document.getElementById('val-' + key));
                    flashStatElement(document.getElementById('bar-' + key));
                }
            });
            if (changed.has('trust.swn')) {
                flashStatElement(valSwn);
                flashStatElement(barSwn);
            }
            if (changed.has('clues')) {
                flashStatElement(cluesList);
            }
        }
    }

    // ============ 效果应用 ============
    function promoteLevel(context) {
        // 预留扩展：目前仅用于在位份变化时刷新 UI
        const changed = new Set(['rank']);
        updateUI(changed);
    }

    function applyEffects(effects) {
        if (!effects) return;
        const notifications = [];
        const changed = new Set();
        let hasNegativeChange = false;

        // 生存/进度
        if (typeof effects.safety === 'number') {
            const old = gameState.safety;
            const maxSafety = STAT_META.safety.max || 100;
            gameState.safety = clamp(old + effects.safety, 0, maxSafety);
            changed.add('safety');
            if (effects.safety !== 0) {
                const sign = effects.safety > 0 ? '+' : '';
                notifications.push(`安全值 ${sign}${effects.safety}（${old}→${gameState.safety}）`);
                if (effects.safety < 0) hasNegativeChange = true;
            }
        }

        let deltaProgress = 0;
        if (typeof effects.mainProgress === 'number') deltaProgress += effects.mainProgress;
        if (typeof effects.case === 'number') deltaProgress += effects.case;
        if (deltaProgress !== 0) {
            const old = (typeof gameState.mainProgress === 'number')
                ? gameState.mainProgress
                : (typeof gameState.caseProgress === 'number' ? gameState.caseProgress : 0);
            const maxProgress = STAT_META.mainProgress.max || 100;
            gameState.mainProgress = clamp(old + deltaProgress, 0, maxProgress);
            gameState.caseProgress = gameState.mainProgress;
            changed.add('mainProgress');
            const sign = deltaProgress > 0 ? '+' : '';
            notifications.push(`翻案进度 ${sign}${deltaProgress}%（${old}→${gameState.mainProgress}）`);
            if (deltaProgress < 0) hasNegativeChange = true;
        }

        // 好感度
        if (effects.affection) {
            gameState.affection = gameState.affection || {};
            const nameMap = { xch: '萧承珩', xjy: '萧璟言', gxz: '顾行之', hlt: '赫连霆', xcy: '萧承煜' };
            Object.entries(effects.affection).forEach(([key, diff]) => {
                if (typeof diff !== 'number' || !Number.isFinite(diff) || diff === 0) return;
                const old = Number.isFinite(gameState.affection[key]) ? gameState.affection[key] : 0;
                gameState.affection[key] = clamp(old + diff, 0, 100);
                changed.add('affection.' + key);
                const name = nameMap[key] || key;
                const sign = diff > 0 ? '+' : '';
                notifications.push(`${name}好感 ${sign}${diff}（${old}→${gameState.affection[key]}）`);
                if (diff < 0) hasNegativeChange = true;
            });
        }

        // 信任
        if (effects.trust) {
            gameState.trust = gameState.trust || {};
            Object.entries(effects.trust).forEach(([key, diff]) => {
                if (typeof diff !== 'number' || !Number.isFinite(diff) || diff === 0) return;
                const old = Number.isFinite(gameState.trust[key]) ? gameState.trust[key] : 0;
                gameState.trust[key] = clamp(old + diff, 0, 100);
                const label = key === 'swn' ? '苏婉宁信任' : `信任(${key})`;
                changed.add('trust.' + key);
                const sign = diff > 0 ? '+' : '';
                notifications.push(`${label} ${sign}${diff}（${old}→${gameState.trust[key]}）`);
                if (diff < 0) hasNegativeChange = true;
            });
        }

        // 位份 & 头衔
        if (effects.rank != null || effects.rankTitle) {
            const oldRank = Number.isFinite(gameState.rank) ? gameState.rank : DEFAULT_GAME_STATE.rank;
            let newRank = oldRank;

            if (effects.rank != null) {
                if (typeof effects.rank === 'number') {
                    // 兼容：小整数视为相对变化，否则按绝对名次处理
                    if (effects.rank >= -3 && effects.rank <= 3 && !effects.rankTitle) {
                        newRank = oldRank + effects.rank;
                    } else {
                        newRank = effects.rank;
                    }
                } else if (typeof effects.rank === 'string') {
                    const idx = rankNames.indexOf(effects.rank);
                    if (idx > 0) newRank = idx;
                }
            }

            newRank = clamp(newRank, 1, rankNames.length - 1);
            gameState.rank = newRank;
            changed.add('rank');

            if (effects.rankTitle !== undefined) {
                gameState.rankTitle = effects.rankTitle;
            }

            promoteLevel({
                previousRank: oldRank,
                newRank: newRank,
                title: gameState.rankTitle || rankNames[newRank]
            });

            if (oldRank !== newRank || effects.rankTitle) {
                const label = rankNames[newRank] || '';
                notifications.push(`位份变化：${label}`);
            }
        }

        // 线索（去重追加）
        if (effects.clue) {
            if (!Array.isArray(gameState.clues)) {
                gameState.clues = [];
            }
            const existing = new Set(gameState.clues);
            const incoming = Array.isArray(effects.clue) ? effects.clue : [effects.clue];
            incoming.forEach(c => {
                if (!c || existing.has(c)) return;
                existing.add(c);
                gameState.clues.push(c);
                notifications.push(`获得线索：${c}`);
            });
            changed.add('clues');
        }

        // 标记位
        if (effects.flags) {
            if (!gameState.flags || typeof gameState.flags !== 'object') {
                gameState.flags = {};
            }
            Object.assign(gameState.flags, effects.flags);
        }

        updateUI(changed);

        if (notifications.length > 0) {
            const type = hasNegativeChange ? 'negative' : 'positive';
            showNotification(notifications.join(' | '), type);
        }
    }

    function triggerDeath(text) {
        const finalText = text || DEFAULT_DEATH_TEXT;
        const deathTextEl = document.getElementById('death-text');
        if (deathTextEl) deathTextEl.textContent = finalText;
        const screen = document.getElementById('death-screen');
        if (screen) screen.classList.add('active');
        try {
            if (typeof BGM !== 'undefined' && BGM && typeof BGM.changeMood === 'function') {
                BGM.changeMood('mysterious');
            }
        } catch (e) {}
    }

    // ============ 存档系统 ============
    function hasSave() {
        try {
            return typeof localStorage !== 'undefined' && !!localStorage.getItem(SAVE_KEY);
        } catch (e) {
            return false;
        }
    }

    function saveGame(isManual) {
        try {
            if (typeof localStorage === 'undefined') return;
            const payload = {
                version: 32,
                savedAt: Date.now(),
                state: gameState
            };
            const data = JSON.stringify(payload);
            // 始终写入自动存档槽位（用于"继续游戏"）
            localStorage.setItem(SAVE_KEY, data);
            // 手动保存时额外写入手动存档槽位（用于"读取存档"）
            if (isManual) {
                localStorage.setItem(SAVE_KEY_MANUAL, data);
            }
        } catch (e) {
            console.warn('保存存档失败：', e);
        }
    }

    function normalizeLoadedState(raw) {
        const base = createInitialGameState();
        if (!raw || typeof raw !== 'object') return base;

        const state = Object.assign({}, base, raw);
        state.affection = Object.assign({}, base.affection, raw.affection || {});
        state.trust = Object.assign({}, base.trust, raw.trust || {});
        state.faction = Object.assign({}, base.faction, raw.faction || {});
        state.flags = Object.assign({}, base.flags, raw.flags || {});
        state.clues = Array.isArray(raw.clues) ? raw.clues.slice() : (Array.isArray(base.clues) ? base.clues.slice() : []);
        state.currentNode = raw.currentNode || base.currentNode;

        const maxSafety = STAT_META.safety.max || 100;
        const maxProgress = STAT_META.mainProgress.max || 100;
        state.safety = clamp(state.safety, 0, maxSafety);

        if (typeof state.mainProgress !== 'number' && typeof state.caseProgress === 'number') {
            state.mainProgress = state.caseProgress;
        }
        if (typeof state.mainProgress !== 'number') {
            state.mainProgress = base.mainProgress;
        }
        state.mainProgress = clamp(state.mainProgress, 0, maxProgress);
        state.caseProgress = state.mainProgress;

        return state;
    }

    function loadGame() {
        try {
            if (typeof localStorage === 'undefined') return false;
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return false;
            const parsed = JSON.parse(raw);
            const stateFromSave = parsed && parsed.state ? parsed.state : parsed;
            gameState = normalizeLoadedState(stateFromSave);
            updateUI();
            return true;
        } catch (e) {
            console.warn('加载存档失败：', e);
            return false;
        }
    }

    function deleteSave() {
        try {
            if (typeof localStorage === 'undefined') return;
            localStorage.removeItem(SAVE_KEY);
            localStorage.removeItem(SAVE_KEY_MANUAL);
        } catch (e) {}
    }

    function loadGameFromMenu() {
        // 从手动存档槽位读取
        let hasManualSave = false;
        try {
            hasManualSave = typeof localStorage !== 'undefined' && !!localStorage.getItem(SAVE_KEY_MANUAL);
        } catch (e) {}

        if (!hasManualSave) {
            showNotification('没有手动保存的存档，请先使用"保存进度"', 'negative');
            return;
        }

        try {
            const raw = localStorage.getItem(SAVE_KEY_MANUAL);
            if (!raw) {
                showNotification('存档读取失败', 'negative');
                return;
            }
            const parsed = JSON.parse(raw);
            const stateFromSave = parsed && parsed.state ? parsed.state : parsed;
            gameState = normalizeLoadedState(stateFromSave);

            // 同步更新自动存档（确保"继续游戏"也指向这个状态）
            localStorage.setItem(SAVE_KEY, raw);

            updateUI();
            initCharacterGallery();

            // 关闭侧边面板
            const panel = document.getElementById('side-panel');
            const overlay = document.getElementById('overlay');
            if (panel) panel.classList.remove('open');
            if (overlay) overlay.classList.remove('active');

            // 重新渲染当前节点
            const nodeId = gameState.currentNode || 'start';
            renderNode(nodeId, { skipEffects: true, fromLoad: true });
            showNotification('已回到上次手动保存的进度', 'positive');
        } catch (e) {
            console.warn('读取存档失败：', e);
            showNotification('存档读取失败', 'negative');
        }
    }

    function confirmNewGame() {
        if (!hasSave()) {
            gameState = createInitialGameState();
            updateUI();
            showNaming();
            return;
        }

        const dialog = document.getElementById('confirm-newgame');
        const yesBtn = document.getElementById('confirm-newgame-yes');
        const noBtn = document.getElementById('confirm-newgame-no');

        // 如果没有自定义弹窗，退回到浏览器 confirm
        if (!dialog || !yesBtn || !noBtn) {
            const ok = window.confirm
                ? window.confirm('检测到已有存档，开始新的命运将清除当前进度，确定继续？')
                : true;
            if (ok) {
                deleteSave();
                gameState = createInitialGameState();
                updateUI();
                showNaming();
            }
            return;
        }

        dialog.style.display = 'flex';

        const cleanup = () => {
            dialog.style.display = 'none';
            yesBtn.removeEventListener('click', onYes);
            noBtn.removeEventListener('click', onNo);
        };

        const onYes = () => {
            cleanup();
            deleteSave();
            gameState = createInitialGameState();
            updateUI();
            showNaming();
        };

        const onNo = () => {
            cleanup();
        };

        yesBtn.addEventListener('click', onYes);
        noBtn.addEventListener('click', onNo);
    }

    // ============ 角色立绘/头像相关 ============
    function getCharacterImage(name) {
        if (!name) return null;
        return CHARACTER_IMAGES[name] || null;
    }

    function enhanceDialoguesWithAvatars(rootEl) {
        if (!rootEl) return;
        const dialogues = rootEl.querySelectorAll('.dialogue[data-speaker]');
        dialogues.forEach(p => {
            const speaker = (p.dataset.speaker || '').trim();
            if (!speaker) return;
            // 已经包裹过的跳过
            if (p.parentElement && p.parentElement.classList.contains('dialogue-with-avatar')) return;
            const avatarSrc = getCharacterImage(speaker);
            const wrapper = document.createElement('div');
            wrapper.className = 'dialogue-with-avatar';
            const avatarEl = document.createElement(avatarSrc ? 'img' : 'div');
            avatarEl.classList.add('dialogue-avatar');
            if (avatarSrc) {
                avatarEl.src = avatarSrc;
                avatarEl.alt = speaker;
                avatarEl.style.cursor = 'pointer';
                avatarEl.onclick = (e) => { e.stopPropagation(); showCharFullscreen(speaker, avatarSrc); };
            } else {
                avatarEl.classList.add('text-avatar');
                avatarEl.textContent = speaker.slice(0, 2);
            }
            const parent = p.parentElement;
            if (!parent) return;
            parent.insertBefore(wrapper, p);
            wrapper.appendChild(avatarEl);
            wrapper.appendChild(p);
        });
    }

    const CHARACTER_TITLES = {
        '萧承珩': '瑾王',
        '萧璟言': '三皇子',
        '顾行之': '新科状元',
        '赫连霆': '北狄可汗',
        '萧承煜': '大晟天子'
    };

    // 别名→正式名映射，统一三处展示
    const CHARACTER_CANONICAL = {
        '瑾王': '萧承珩',
        '三皇子': '萧璟言',
        '皇帝': '萧承煜',
        '陛下': '萧承煜',
        '大皇子': '萧璟恒',
        '四皇子': '萧璟宁',
        '柳氏': '淑妃',
        '王氏': '德妃',
        '赵氏': '贤妃',
        '郑氏': '皇后'
    };

    function initCharacterGallery() {
        const gallery = document.getElementById('char-gallery');
        if (!gallery) return;
        const categories = [
            { title: '玩家', chars: ['玩家'] },
            { title: '可攻略角色', chars: ['萧承珩', '萧璟言', '顾行之', '赫连霆', '萧承煜'] },
            { title: '后宫妃嫔', chars: ['皇后', '淑妃', '德妃', '贤妃'] },
            { title: '好友', chars: ['苏婉宁', '阿蛮'] }
        ];
        gallery.innerHTML = '';
        categories.forEach(cat => {
            const header = document.createElement('div');
            header.className = 'char-gallery-header';
            header.textContent = cat.title;
            gallery.appendChild(header);
            const grid = document.createElement('div');
            grid.className = 'char-gallery-grid';
            cat.chars.forEach(name => {
                const src = getCharacterImage(name);
                if (!src) return;
                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = () => showCharFullscreen(name, src);
                const img = document.createElement('img');
                img.className = 'char-card-avatar';
                img.src = src;
                img.alt = name;
                const info = document.createElement('div');
                info.className = 'char-card-info';
                const label = document.createElement('div');
                label.className = 'char-card-name';
                if (name === '玩家') {
                    label.textContent = gameState.playerName || '玩家';
                } else {
                    label.textContent = name;
                }
                info.appendChild(label);
                // 可攻略角色加身份副标题
                const title = CHARACTER_TITLES[name];
                if (title) {
                    const sub = document.createElement('div');
                    sub.className = 'char-card-title';
                    sub.textContent = title;
                    info.appendChild(sub);
                }
                card.appendChild(img);
                card.appendChild(info);
                grid.appendChild(card);
            });
            gallery.appendChild(grid);
        });
    }

    function showCharFullscreen(name, src) {
        const viewer = document.getElementById('char-fullscreen');
        const img = document.getElementById('char-fullscreen-img');
        const label = document.getElementById('char-fullscreen-name');
        const subtitle = document.getElementById('char-fullscreen-title');
        // 别名统一为正式名
        const canonical = CHARACTER_CANONICAL[name] || name;
        if (img) {
            img.src = src;
        }
        if (label) {
            label.textContent = (canonical === '玩家') ? (gameState.playerName || '玩家') : canonical;
        }
        const title = CHARACTER_TITLES[canonical];
        if (subtitle) {
            subtitle.textContent = title || '';
            subtitle.style.display = title ? 'block' : 'none';
        }
        if (viewer) viewer.classList.add('active');
    }

    function closeCharFullscreen() {
        const viewer = document.getElementById('char-fullscreen');
        if (viewer) viewer.classList.remove('active');
    }

    // ============ 剧情渲染 ============
    function renderNode(nodeId, options) {
        options = options || {};
        if (nodeId === 'restart') {
            // 改为页面内重置，避免移动端拦截 location.reload 导致"重新开始"无反应
            restartGame();
            return;
        }
        const node = storyNodes[nodeId];
        if (!node) return;
        gameState.currentNode = nodeId;

        // 切换BGM氛围
        try {
            const mood = (typeof sceneMoodMap !== 'undefined' && sceneMoodMap && sceneMoodMap[nodeId]) || 'calm';
            if (typeof BGM !== 'undefined' && BGM && BGM.isPlaying && mood !== BGM.currentMood) {
                BGM.changeMood(mood);
            }
        } catch (e) {}

        // 场景头
        const locEl = document.getElementById('scene-location');
        if (locEl) locEl.textContent = node.location || '';
        const timeEl = document.getElementById('scene-time');
        if (timeEl) timeEl.textContent = node.time || '';

        // 替换文中的玩家名
        let text = node.text || '';
        if (typeof text === 'string') {
            text = text.replace(/\{name\}/g, gameState.playerName || DEFAULT_GAME_STATE.playerName);
        }
        const storyEl = document.getElementById('story-text');
        if (storyEl) {
            storyEl.innerHTML = text;
            enhanceDialoguesWithAvatars(storyEl);
        }

        // 选项
        const container = document.getElementById('choices-container');
        if (container) {
            container.innerHTML = '';
            if (Array.isArray(node.choices) && node.choices.length > 0) {
                const labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
                let visibleIndex = 0;
                node.choices.forEach((choice) => {
                    // 检查条件
                    if (choice.condition && typeof choice.condition === 'function') {
                        let ok = false;
                        try {
                            ok = !!choice.condition();
                        } catch (e) {
                            ok = false;
                        }
                        if (!ok) return;
                    }
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    let html = `<span class="choice-label">${labels[visibleIndex] || '•'}.</span> ${choice.text}`;
                    if (choice.warning) html += `<span class="choice-warning">⚠️${choice.warning}</span>`;
                    btn.innerHTML = html;
                    btn.onclick = () => selectChoice(choice);
                    container.appendChild(btn);
                    visibleIndex++;
                });
            }
        }

        // 滚动到顶部
        const scroller = document.getElementById('story-scroll');
        if (scroller) scroller.scrollTop = 0;

        // 自动应用节点效果（可被读档跳过）
        const skipEffects = !!options.skipEffects;
        let appliedEffects = false;
        if (!skipEffects && node.effects) {
            applyEffects(node.effects);
            appliedEffects = true;
            // 死亡检测：节点效果结算后立即判定，阻止后续存档
            if (typeof gameState.safety === 'number' && gameState.safety <= 0) {
                const nodeDeathText = node.deathText || (node.effects && node.effects.deathText);
                triggerDeath(nodeDeathText || DEFAULT_DEATH_TEXT);
                return;
            }
        }
        if (!appliedEffects) {
            updateUI();
        }

        if (!options.fromLoad) {
            saveGame();
        }
    }

    // 在页面内重置游戏并回到封面，替代依赖 location.reload() 的"重新开始"。
    // 移动端会拦截脱离用户手势（如放在 setTimeout 里）的页面刷新，导致 reload 无效；
    // 直接在当前点击流程中重置状态，既同步又无需刷新，手机/电脑都可靠。
    function restartGame() {
        deleteSave();

        // 重置游戏状态
        gameState = createInitialGameState();

        // 切换界面回到封面
        const game = document.getElementById('game-screen');
        if (game) game.classList.remove('active');
        const naming = document.getElementById('naming-screen');
        if (naming) naming.classList.remove('active');
        const death = document.getElementById('death-screen');
        if (death) death.classList.remove('active');
        const splash = document.getElementById('splash-screen');
        if (splash) splash.classList.remove('hidden');

        // 恢复封面音乐按钮（进入命名界面时曾被隐藏）
        const splashBtn = document.getElementById('splash-music-btn');
        if (splashBtn) splashBtn.style.display = '';

        // 已删除存档，隐藏"继续游戏"
        const contBtn = document.getElementById('btn-continue-game');
        if (contBtn) contBtn.style.display = 'none';

        // 刷新顶部状态显示并复位滚动
        try { updateUI(); } catch (e) {}
        const scroller = document.getElementById('story-scroll');
        if (scroller) scroller.scrollTop = 0;

        // 回到封面后切回标题音乐氛围（若正在播放）
        try {
            if (typeof BGM !== 'undefined' && BGM && BGM.isPlaying && typeof BGM.changeMood === 'function') {
                BGM.changeMood('title');
            }
        } catch (e) {}
    }

    function selectChoice(choice) {
        if (!choice) return;
        if (choice.effects) {
            applyEffects(choice.effects);
            // 死亡检测：选项效果结算后立即判定，阻止跳转与存档
            if (typeof gameState.safety === 'number' && gameState.safety <= 0) {
                const eff = choice.effects || {};
                const deathText = choice.deathText || eff.deathText || DEFAULT_DEATH_TEXT;
                triggerDeath(deathText);
                return;
            }
        }
        // 支持 next 为函数（用于动态路由，如结局自动判定）
        const nextNode = typeof choice.next === 'function' ? choice.next() : choice.next;
        // "重新开始"：在用户点击的同步流程内直接处理，不走延迟执行 + location.reload，
        // 否则移动端会因脱离用户手势而拦截刷新，表现为点击无反应。
        if (nextNode === 'restart') {
            restartGame();
            return;
        }
        if (nextNode) {
            setTimeout(() => renderNode(nextNode), 300);
        }
    }
    </script>
